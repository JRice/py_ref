repos:
  # Ruff: fast linter + formatter (replaces flake8, isort, pyupgrade, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff           # lint + auto-fix
        args: [--fix]
      - id: ruff-format    # format (replaces black)

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements    # catches leftover breakpoint() / pdb calls

  # Type checking (optional — remove if you're not using mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, pydantic]
        args: [--ignore-missing-imports, --no-strict-optional]
